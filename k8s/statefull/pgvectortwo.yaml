apiVersion: v1
kind: ConfigMap
metadata:
  name: pgvector-init
  namespace: ai-apps
data:
  init.sh: |
    #!/bin/bash
    set -e

    # FIXED: Wrapped database names in double quotes so hyphens work.
    # The default 'postgres' superuser automatically owns these databases.
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE "account-micro";
      CREATE DATABASE "workspace-micro";
      CREATE DATABASE "intellegence-micro";
    EOSQL
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: ai-apps
spec:
  selector:
    matchLabels:
      app: pgvector
  serviceName: pgvector
  replicas: 1
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      containers:
        - name: pgvector
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: pgvector-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  namespace: ai-apps
spec:
  clusterIP: None
  selector:
    app: pgvector
  ports:
    - port: 5432