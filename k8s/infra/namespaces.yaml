# k8s/infra/namespace.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: ai-apps

---
# to create a separate ns for previews

apiVersion: v1
kind: Namespace
metadata:
  name: lovable-previews

---
# configmap for shared config values across services

apiVersion: v1
kind: ConfigMap
metadata:
  name: lovable-shared-config
  namespace: ai-apps
data:
  PREVIEW_DOMAIN: "previews.kashyapcode.in"
  PREVIEW_NAMESPACE: "lovable-previews"
  PROXY_PORT: "80"
  APP_FRONTEND_URL: "http://kashyapcode.in"
