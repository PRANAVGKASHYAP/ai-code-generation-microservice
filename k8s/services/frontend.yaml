apiVersion: apps/v1
kind: Deployment
metadata:
  name: lovable-frontend
  namespace: ai-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lovable-frontend
  template:
    metadata:
      labels:
        app: lovable-frontend
    spec:
      containers:
        - name: lovable-frontend
          image: pranavgk2003/lobable-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lovable-frontend
  namespace: ai-apps
spec:
  type: ClusterIP
  selector:
    app: lovable-frontend
  ports:
    - port: 80
      targetPort: 80