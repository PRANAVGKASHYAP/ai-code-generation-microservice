spring:
  application:
    name: config-service

  cloud:
    config:
      server:
        git:
          uri: https://github.com/PRANAVGKASHYAP/microservice-config-server.git
          username: PRANAVGKASHYAP
          password: ${GITHUB_PAT_TOKEN}
          default-label: main
          clone-on-start: true


server.port: 8888


# adding configuration to deploy this service on a k8s cluster
---
spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false
    config.server.git:
      uri: https://github.com/PRANAVGKASHYAP/microservice-config-server.git
      username: ${GIT_USERNAME}
      password: ${GIT_PASSWORD}
      default-label: main
      clone-on-start: true

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false