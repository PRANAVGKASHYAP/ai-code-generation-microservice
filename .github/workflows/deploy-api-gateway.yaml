name: Deploy API Gateway Service

on:
  push:
    branches:
      - main # ✅ FIXED: Updated to track your true default branch
    paths:
      - 'api-gateway/**'
  workflow_dispatch: # ✅ ADDED: Gives you a manual trigger button in the GitHub Actions UI

env:
  SERVICE_NAME: api-gateway
  IMAGE_NAME: pranavgk2003/llm_apps_api-gateway

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy to GKE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Push Docker Image with Jib
        working-directory: ./${{ env.SERVICE_NAME }}
        run: |
          chmod +x ./mvnw # ✅ FIXED: Added standalone permission grant line to clear the 126 execution error
          ./mvnw compile jib:build \
            -Djib.to.image=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ secrets.DOCKERHUB_USERNAME }} \
            -Djib.to.auth.password=${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER }}
          location: ${{ secrets.GCP_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }} # ✅ FIXED: Explicitly passed your secret project ID string

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} \
          ${{ env.SERVICE_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n ai-apps # ✅ FIXED: Swapped namespace from lovable-core to your true active namespace
          
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n ai-apps # ✅ FIXED: Matches active namespace