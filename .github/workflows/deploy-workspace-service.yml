name: Deploy Workspace Microservice

on:
  push:
    branches:
      - main
    paths:
      - 'workspace-service/**'
      - '.github/workflows/deploy-workspace.yaml'
  workflow_dispatch:

env:
  SERVICE_NAME: workspace-service
  IMAGE_NAME: pranavgk2003/llm_apps_workspace-service

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Package, and Deploy Workspace Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ✅ NEW: Compiles and caches the common library using the Maven Wrapper pattern
      - name: Build and Install Common Lib
        working-directory: ./common-lib
        run: |
          chmod +x ./mvnw
          ./mvnw clean install -DskipTests

      - name: Build with Maven
        working-directory: ./workspace-service
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./workspace-service
          file: ./workspace-service/Dockerfile
          push: true
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER }}
          location: ${{ secrets.GCP_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} \
          ${{ env.SERVICE_NAME }}=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n ai-apps
          
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n ai-apps