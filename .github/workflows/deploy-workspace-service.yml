name: Deploy Workspace Microservice

on:
  push:
    branches:
      - main
    paths:
      - 'workspace-service/**' # ✅ Runs only when code inside the workspace folder changes
      - '.github/workflows/deploy-workspace.yaml'
  workflow_dispatch: # Allows you to manually trigger this build from GitHub if needed

env:
  SERVICE_NAME: workspace-service
  IMAGE_NAME: pranavgk2003/llm_apps_workspace-service # ✅ Maps to your Docker Hub repository

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Package, and Deploy Workspace Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Caches dependencies to make future builds blazing fast

      - name: Build with Maven
        run: |
          cd workspace-service
          mvn clean package -DskipTests # Packages your Spring Boot app into a bootable JAR

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./workspace-service # ✅ Sets execution context inside the service root
          file: ./workspace-service/Dockerfile
          push: true
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER }}
          location: ${{ secrets.GCP_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Deploy to GKE
        run: |
          # ✅ Explicitly updates the running container image to use the new unique Commit SHA tag
          kubectl set image deployment/${{ env.SERVICE_NAME }} \
          ${{ env.SERVICE_NAME }}=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n ai-apps
          
          # Watch the rollout until it successfully scales up the new version and cleans up the old one
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n ai-apps